<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0e2a3c"/>
      <stop offset="55%" stop-color="#16465b"/>
      <stop offset="100%" stop-color="#1d5a6e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f5a975" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5a975" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffc08f"/>
      <stop offset="100%" stop-color="#e8824a"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff0fb"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#04141d" flood-opacity="0.45"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#04141d" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="880" cy="360" r="360" fill="url(#glow)"/>
  <circle cx="140" cy="1500" r="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Decorative floating dots -->
  <g fill="#ffffff" opacity="0.10">
    <circle cx="180" cy="200" r="6"/>
    <circle cx="960" cy="900" r="8"/>
    <circle cx="120" cy="1040" r="5"/>
    <circle cx="1000" cy="1360" r="6"/>
    <circle cx="300" cy="1240" r="4"/>
  </g>

  <!-- Eyebrow chip -->
  <g filter="url(#soft)">
    <rect x="80" y="180" width="360" height="70" rx="35" fill="#0c2532" opacity="0.85"/>
  </g>
  <rect x="104" y="204" width="14" height="22" rx="7" fill="url(#accent)"/>
  <text x="134" y="224" fill="#ffd8bd" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="800" letter-spacing="3">CLOUDY SHORTS</text>

  <!-- Title zone -->
  <rect x="76" y="300" width="12" height="300" rx="6" fill="url(#accent)"/>
  <rect x="110" y="300" width="700" height="150" rx="18" fill="#ffffff" opacity="0.06"/>
  <rect x="110" y="470" width="560" height="110" rx="16" fill="#ffffff" opacity="0.04"/>

  <!-- Cloud head only (no body) -->
  <g transform="translate(842, 470)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-46" cy="18" r="52" fill="url(#cloudFill)"/>
      <circle cx="46" cy="18" r="52" fill="url(#cloudFill)"/>
      <circle cx="-22" cy="-30" r="46" fill="url(#cloudFill)"/>
      <circle cx="26" cy="-30" r="46" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="22" rx="82" ry="56" fill="url(#cloudFill)"/>
    </g>
    <!-- Graduation cap -->
    <polygon points="-52,-40 0,-64 52,-40 0,-18" fill="#22506a"/>
    <polygon points="-52,-40 0,-58 52,-40 0,-24" fill="#2c5f7c"/>
    <path d="M34,-32 L34,4" stroke="#f5a975" stroke-width="4" stroke-linecap="round"/>
    <circle cx="34" cy="8" r="6" fill="#f5a975"/>
    <!-- Eyes -->
    <ellipse cx="-20" cy="2" rx="11" ry="13" fill="#fff"/>
    <circle cx="-19" cy="4" r="7" fill="#25384a"/>
    <circle cx="-16" cy="0" r="3" fill="#fff"/>
    <ellipse cx="20" cy="2" rx="11" ry="13" fill="#fff"/>
    <circle cx="21" cy="4" r="7" fill="#25384a"/>
    <circle cx="24" cy="0" r="3" fill="#fff"/>
    <!-- Smile -->
    <path d="M-12,26 Q0,38 12,26" fill="none" stroke="#d45b5b" stroke-width="5" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-38" cy="20" rx="11" ry="7" fill="#ffb4b4" opacity="0.4"/>
    <ellipse cx="38" cy="20" rx="11" ry="7" fill="#ffb4b4" opacity="0.4"/>
  </g>

  <!-- Content card -->
  <g filter="url(#soft)">
    <rect x="50" y="660" width="980" height="520" rx="26" fill="#0c2532" opacity="0.55"/>
  </g>
  <rect x="50" y="660" width="980" height="520" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
  <g opacity="0.4">
    <circle cx="96" cy="752" r="7" fill="#f5a975"/>
    <rect x="120" y="740" width="860" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
    <circle cx="96" cy="822" r="7" fill="#f5a975"/>
    <rect x="120" y="810" width="860" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
    <circle cx="96" cy="892" r="7" fill="#f5a975"/>
    <rect x="120" y="880" width="860" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
    <circle cx="96" cy="962" r="7" fill="#f5a975"/>
    <rect x="120" y="950" width="700" height="24" rx="12" fill="#ffffff" opacity="0.10"/>
  </g>

  <!-- Narration area -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#061620" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="url(#accent)"/>
  <text x="90" y="1614" fill="#ffd8bd" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>

  <!-- Progress -->
  <rect x="0" y="1884" width="1080" height="8" fill="#ffffff" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="url(#accent)"/>
</svg>
