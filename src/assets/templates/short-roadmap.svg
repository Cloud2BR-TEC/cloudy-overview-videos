<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#efeafb"/>
      <stop offset="100%" stop-color="#d7cbf1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#9575cd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9575cd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b39ddb"/>
      <stop offset="100%" stop-color="#7e57c2"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eae2f7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#241640" flood-opacity="0.22"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#241640" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="380" r="400" fill="url(#glow)"/>

  <!-- Title chip -->
  <rect x="390" y="150" width="300" height="66" rx="33" fill="#9575cd" opacity="0.22"/>
  <text x="540" y="192" fill="#5e35b1" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3" text-anchor="middle">ROADMAP</text>

  <!-- Cloud head only -->
  <g transform="translate(540, 320)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="-16" cy="-22" r="32" fill="url(#cloudFill)"/>
      <circle cx="18" cy="-22" r="32" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="60" ry="42" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-38,-30 0,-46 38,-30 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="-13" cy="4" r="5.5" fill="#25384a"/>
    <ellipse cx="14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="15" cy="4" r="5.5" fill="#25384a"/>
    <path d="M-8,20 Q0,28 8,20" fill="none" stroke="#d45b5b" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Winding roadmap path -->
  <path d="M180,520 C400,520 400,700 600,700 C800,700 800,880 500,880 C260,880 260,1060 820,1060"
        fill="none" stroke="#9575cd" stroke-width="10" stroke-linecap="round" stroke-dasharray="4 26" opacity="0.5"/>

  <!-- Milestone nodes -->
  <g filter="url(#soft)">
    <circle cx="180" cy="520" r="42" fill="url(#node)"/>
    <circle cx="600" cy="700" r="42" fill="url(#node)"/>
    <circle cx="500" cy="880" r="42" fill="url(#node)"/>
    <circle cx="820" cy="1060" r="42" fill="url(#node)"/>
  </g>
  <g fill="#fff" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="800" text-anchor="middle">
    <text x="180" y="532">1</text>
    <text x="600" y="712">2</text>
    <text x="500" y="892">3</text>
    <text x="820" y="1072">4</text>
  </g>
  <g fill="#5e35b1" opacity="0.2">
    <rect x="250" y="500" width="240" height="20" rx="10"/>
    <rect x="670" y="680" width="240" height="20" rx="10"/>
    <rect x="150" y="940" width="240" height="20" rx="10"/>
    <rect x="540" y="1120" width="240" height="20" rx="10"/>
  </g>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#241640" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#9575cd"/>
  <text x="90" y="1614" fill="#cdbdea" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#241640" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#9575cd"/>
</svg>
