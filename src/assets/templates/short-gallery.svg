<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e9f3fd"/>
      <stop offset="100%" stop-color="#c6e0f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0eefb"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0d2f4f" flood-opacity="0.20"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0d2f4f" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="360" r="380" fill="url(#glow)"/>

  <!-- Title chip -->
  <rect x="390" y="150" width="300" height="66" rx="33" fill="#42a5f5" opacity="0.2"/>
  <text x="540" y="192" fill="#1565c0" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3" text-anchor="middle">GALLERY</text>

  <!-- Cloud head only -->
  <g transform="translate(540, 320)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="-16" cy="-22" r="32" fill="url(#cloudFill)"/>
      <circle cx="18" cy="-22" r="32" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="60" ry="42" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-38,-30 0,-46 38,-30 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="-13" cy="4" r="5.5" fill="#25384a"/>
    <ellipse cx="14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="15" cy="4" r="5.5" fill="#25384a"/>
    <path d="M-8,20 Q0,28 8,20" fill="none" stroke="#d45b5b" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Image grid frames -->
  <g filter="url(#soft)">
    <rect x="70" y="460" width="440" height="300" rx="18" fill="#ffffff" opacity="0.85"/>
    <rect x="570" y="460" width="440" height="300" rx="18" fill="#ffffff" opacity="0.85"/>
    <rect x="70" y="800" width="440" height="300" rx="18" fill="#ffffff" opacity="0.85"/>
    <rect x="570" y="800" width="440" height="300" rx="18" fill="#ffffff" opacity="0.85"/>
  </g>
  <g fill="#42a5f5" opacity="0.2">
    <circle cx="180" cy="580" r="40"/>
    <polygon points="130,700 250,560 360,700"/>
    <circle cx="680" cy="580" r="40"/>
    <polygon points="630,700 750,560 860,700"/>
    <circle cx="180" cy="920" r="40"/>
    <polygon points="130,1040 250,900 360,1040"/>
    <circle cx="680" cy="920" r="40"/>
    <polygon points="630,1040 750,900 860,1040"/>
  </g>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#0d2f4f" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#42a5f5"/>
  <text x="90" y="1614" fill="#b7dbfb" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#0d2f4f" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#42a5f5"/>
</svg>
