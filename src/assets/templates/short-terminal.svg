<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#07211d"/>
      <stop offset="100%" stop-color="#0e3730"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d7f0ec"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#031311" flood-opacity="0.4"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#031311" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="440" r="420" fill="url(#glow)"/>

  <!-- Terminal window -->
  <g filter="url(#soft)">
    <rect x="70" y="240" width="940" height="800" rx="20" fill="#04140f"/>
  </g>
  <rect x="70" y="240" width="940" height="56" rx="20" fill="#0a221c"/>
  <rect x="70" y="278" width="940" height="18" fill="#0a221c"/>
  <circle cx="112" cy="268" r="9" fill="#ff5f56"/>
  <circle cx="146" cy="268" r="9" fill="#ffbd2e"/>
  <circle cx="180" cy="268" r="9" fill="#27c93f"/>
  <text x="540" y="275" fill="#26a69a" font-family="'DM Mono', monospace" font-size="18" font-weight="700" text-anchor="middle" opacity="0.7">bash</text>

  <!-- Terminal lines -->
  <g font-family="'DM Mono', monospace" font-size="26">
    <text x="110" y="380" fill="#26a69a">$</text>
    <rect x="150" y="360" width="380" height="22" rx="11" fill="#7fdfd3" opacity="0.5"/>
    <text x="110" y="440" fill="#5f8a84" opacity="0.7">&#8250;</text>
    <rect x="150" y="420" width="620" height="20" rx="10" fill="#ffffff" opacity="0.12"/>
    <rect x="150" y="460" width="520" height="20" rx="10" fill="#ffffff" opacity="0.12"/>
    <text x="110" y="540" fill="#26a69a">$</text>
    <rect x="150" y="520" width="300" height="22" rx="11" fill="#7fdfd3" opacity="0.5"/>
    <text x="110" y="600" fill="#5f8a84" opacity="0.7">&#8250;</text>
    <rect x="150" y="580" width="700" height="20" rx="10" fill="#ffffff" opacity="0.12"/>
    <rect x="150" y="620" width="460" height="20" rx="10" fill="#ffffff" opacity="0.12"/>
    <text x="110" y="700" fill="#27c93f">&#10003;</text>
    <rect x="150" y="680" width="420" height="20" rx="10" fill="#27c93f" opacity="0.35"/>
    <text x="110" y="760" fill="#26a69a">$</text>
    <rect x="150" y="740" width="40" height="26" fill="#7fdfd3" opacity="0.8"/>
  </g>

  <!-- Cloud head only -->
  <g transform="translate(880, 930)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="-16" cy="-22" r="32" fill="url(#cloudFill)"/>
      <circle cx="18" cy="-22" r="32" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="60" ry="42" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-38,-30 0,-46 38,-30 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="-13" cy="4" r="5.5" fill="#25384a"/>
    <ellipse cx="14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="15" cy="4" r="5.5" fill="#25384a"/>
    <path d="M-8,20 Q0,28 8,20" fill="none" stroke="#d45b5b" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#031311" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#26a69a"/>
  <text x="90" y="1614" fill="#a1ded6" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#ffffff" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#26a69a"/>
</svg>
