<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#12233a"/>
      <stop offset="55%" stop-color="#1c3d63"/>
      <stop offset="100%" stop-color="#245080"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#64b5f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64b5f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcecfb"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#050f1e" flood-opacity="0.45"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#050f1e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="640" r="460" fill="url(#glow)"/>

  <g fill="#ffffff" opacity="0.10">
    <circle cx="180" cy="300" r="6"/>
    <circle cx="920" cy="480" r="8"/>
    <circle cx="150" cy="1160" r="5"/>
    <circle cx="960" cy="1240" r="6"/>
  </g>

  <!-- Big cloud head only hero -->
  <g transform="translate(540, 560)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-64" cy="24" r="70" fill="url(#cloudFill)"/>
      <circle cx="64" cy="24" r="70" fill="url(#cloudFill)"/>
      <circle cx="-32" cy="-40" r="60" fill="url(#cloudFill)"/>
      <circle cx="36" cy="-40" r="60" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="30" rx="112" ry="76" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-72,-54 0,-84 72,-54 0,-24" fill="#22506a"/>
    <polygon points="-72,-54 0,-78 72,-54 0,-30" fill="#2c5f7c"/>
    <path d="M46,-42 L46,10" stroke="#f5a975" stroke-width="6" stroke-linecap="round"/>
    <circle cx="46" cy="14" r="8" fill="#f5a975"/>
    <ellipse cx="-26" cy="2" rx="15" ry="18" fill="#fff"/>
    <circle cx="-25" cy="5" r="10" fill="#25384a"/>
    <circle cx="-20" cy="-2" r="4" fill="#fff"/>
    <ellipse cx="26" cy="2" rx="15" ry="18" fill="#fff"/>
    <circle cx="27" cy="5" r="10" fill="#25384a"/>
    <circle cx="32" cy="-2" r="4" fill="#fff"/>
    <path d="M-18,30 Q0,48 18,30" fill="none" stroke="#d45b5b" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="-52" cy="24" rx="14" ry="9" fill="#ffb4b4" opacity="0.4"/>
    <ellipse cx="52" cy="24" rx="14" ry="9" fill="#ffb4b4" opacity="0.4"/>
  </g>

  <!-- Title zone -->
  <rect x="140" y="820" width="800" height="80" rx="20" fill="#ffffff" opacity="0.08"/>
  <rect x="220" y="930" width="640" height="56" rx="16" fill="#ffffff" opacity="0.05"/>

  <!-- Accent underline -->
  <rect x="440" y="1040" width="200" height="10" rx="5" fill="url(#accent)"/>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#050f1e" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="url(#accent)"/>
  <text x="90" y="1614" fill="#bcdcfb" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#ffffff" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="url(#accent)"/>
</svg>
