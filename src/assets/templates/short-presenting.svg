<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#eef7fb"/>
      <stop offset="100%" stop-color="#cfe6f2"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#25526b"/>
      <stop offset="100%" stop-color="#173a4f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f1fb"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#123246" flood-opacity="0.28"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#123246" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="720" cy="360" r="420" fill="url(#glow)"/>

  <!-- Decorative dots -->
  <g fill="#4fc3f7" opacity="0.14">
    <circle cx="140" cy="820" r="7"/>
    <circle cx="980" cy="760" r="9"/>
    <circle cx="200" cy="1160" r="5"/>
    <circle cx="900" cy="1200" r="6"/>
  </g>

  <!-- Monitor -->
  <g filter="url(#soft)">
    <rect x="250" y="80" width="760" height="560" rx="22" fill="url(#screen)"/>
  </g>
  <rect x="274" y="104" width="712" height="512" rx="14" fill="#f8fcff"/>
  <rect x="590" y="640" width="120" height="44" rx="6" fill="#173a4f"/>
  <rect x="510" y="682" width="280" height="18" rx="9" fill="#173a4f"/>

  <!-- Screen title chip -->
  <rect x="300" y="132" width="360" height="56" rx="28" fill="#4fc3f7" opacity="0.16"/>
  <rect x="318" y="152" width="14" height="16" rx="7" fill="#2b8fc4"/>
  <text x="344" y="170" fill="#2b8fc4" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="2">SCREEN TITLE</text>

  <!-- Screen bullet rows -->
  <g>
    <circle cx="318" cy="248" r="7" fill="#4fc3f7" opacity="0.5"/>
    <rect x="342" y="236" width="600" height="24" rx="12" fill="#4fc3f7" opacity="0.10"/>
    <circle cx="318" cy="312" r="7" fill="#4fc3f7" opacity="0.5"/>
    <rect x="342" y="300" width="600" height="24" rx="12" fill="#4fc3f7" opacity="0.10"/>
    <circle cx="318" cy="376" r="7" fill="#4fc3f7" opacity="0.5"/>
    <rect x="342" y="364" width="600" height="24" rx="12" fill="#4fc3f7" opacity="0.10"/>
    <circle cx="318" cy="440" r="7" fill="#4fc3f7" opacity="0.5"/>
    <rect x="342" y="428" width="480" height="24" rx="12" fill="#4fc3f7" opacity="0.10"/>
  </g>

  <!-- Cloud head only (no body) -->
  <g transform="translate(170, 560)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-42" cy="16" r="48" fill="url(#cloudFill)"/>
      <circle cx="42" cy="16" r="48" fill="url(#cloudFill)"/>
      <circle cx="-20" cy="-28" r="42" fill="url(#cloudFill)"/>
      <circle cx="24" cy="-28" r="42" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="20" rx="76" ry="52" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-48,-38 0,-60 48,-38 0,-16" fill="#22506a"/>
    <polygon points="-48,-38 0,-54 48,-38 0,-22" fill="#2c5f7c"/>
    <path d="M32,-30 L32,2" stroke="#f5a975" stroke-width="4" stroke-linecap="round"/>
    <circle cx="32" cy="6" r="5" fill="#f5a975"/>
    <ellipse cx="-18" cy="2" rx="10" ry="12" fill="#fff"/>
    <circle cx="-17" cy="4" r="6" fill="#25384a"/>
    <circle cx="-14" cy="0" r="2.5" fill="#fff"/>
    <ellipse cx="18" cy="2" rx="10" ry="12" fill="#fff"/>
    <circle cx="19" cy="4" r="6" fill="#25384a"/>
    <circle cx="22" cy="0" r="2.5" fill="#fff"/>
    <path d="M-11,24 Q0,35 11,24" fill="none" stroke="#d45b5b" stroke-width="4.5" stroke-linecap="round"/>
    <ellipse cx="-34" cy="18" rx="10" ry="6" fill="#ffb4b4" opacity="0.4"/>
    <ellipse cx="34" cy="18" rx="10" ry="6" fill="#ffb4b4" opacity="0.4"/>
  </g>

  <!-- Narration area -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#12293c" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#4fc3f7"/>
  <text x="90" y="1614" fill="#bfe6f8" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>

  <rect x="0" y="1884" width="1080" height="8" fill="#12293c" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#4fc3f7"/>
</svg>
