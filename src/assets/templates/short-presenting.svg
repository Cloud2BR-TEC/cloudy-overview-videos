<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="presenting-bg" x2="1" y2="1"><stop stop-color="#081f2c"/><stop offset="1" stop-color="#174b59"/></linearGradient>
    <linearGradient id="presenting-cloud" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#d9eff5"/></linearGradient>
    <filter id="presenting-shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dy="16" stdDeviation="18" flood-color="#001018" flood-opacity=".32"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#presenting-bg)"/>
  <circle cx="1780" cy="80" r="260" fill="#51c8bd" opacity=".1"/>
  <path d="M0 730C280 600 500 650 710 850H0Z" fill="#51c8bd" opacity=".12"/>
  <text x="90" y="122" fill="#75ddd2" font-family="Segoe UI, sans-serif" font-size="24" font-weight="800" letter-spacing="4">PRESENTING</text>
  <!-- Cloudy head, cap, and face only -->
  <g transform="translate(365 520) scale(2.05)" filter="url(#presenting-shadow)">
    <circle cx="-62" cy="18" r="58" fill="url(#presenting-cloud)"/><circle cx="62" cy="18" r="58" fill="url(#presenting-cloud)"/><circle cx="-31" cy="-35" r="53" fill="url(#presenting-cloud)"/><circle cx="32" cy="-35" r="53" fill="url(#presenting-cloud)"/><ellipse cy="28" rx="104" ry="70" fill="url(#presenting-cloud)"/>
    <polygon points="-72,-54 0,-82 72,-54 0,-27" fill="#f0a23a"/><polygon points="-72,-54 0,-73 72,-54 0,-35" fill="#ffc45b"/><path d="M53-49V-4" stroke="#75ddd2" stroke-width="6"/><circle cx="53" cy="3" r="8" fill="#75ddd2"/>
    <ellipse cx="-31" cy="10" rx="16" ry="20" fill="#fff"/><circle cx="-28" cy="14" r="10" fill="#173442"/><ellipse cx="31" cy="10" rx="16" ry="20" fill="#fff"/><circle cx="34" cy="14" r="10" fill="#173442"/><path d="M-22 43Q0 64 22 43" fill="none" stroke="#d85c65" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Presenting inner slot: x=760 y=120 width=1020 height=600 -->
  <g filter="url(#presenting-shadow)"><rect x="730" y="90" width="1080" height="660" rx="28" fill="#061821"/><rect x="760" y="120" width="1020" height="600" rx="16" fill="#f6fcfd"/></g>
  <rect x="808" y="170" width="190" height="42" rx="21" fill="#51c8bd"/><text x="903" y="198" text-anchor="middle" fill="#08242f" font-family="Segoe UI, sans-serif" font-size="18" font-weight="800">SCREEN TITLE</text>
  <rect x="808" y="258" width="620" height="52" rx="12" fill="#123c4d" opacity=".14"/><g fill="#8ec8cc"><rect x="808" y="350" width="780" height="18" rx="9" opacity=".38"/><rect x="808" y="398" width="880" height="18" rx="9" opacity=".28"/><rect x="808" y="446" width="700" height="18" rx="9" opacity=".22"/></g>
  <!-- Narration band: x=80 y=850 width=1760 height=160 -->
  <rect x="80" y="850" width="1760" height="160" rx="18" fill="#f7fbfc" filter="url(#presenting-shadow)"/><rect x="80" y="850" width="12" height="160" rx="6" fill="#51c8bd"/><text x="130" y="907" fill="#22756f" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800" letter-spacing="3">NARRATION</text>
</svg>
