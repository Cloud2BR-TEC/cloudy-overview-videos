<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d0e8f2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <!-- Monitor / Screen -->
  <rect x="280" y="80" width="720" height="520" rx="14" fill="#1e3a4f"/>
  <rect x="300" y="100" width="680" height="480" rx="8" fill="#f8fcff"/>
  <!-- Monitor stand -->
  <rect x="560" y="600" width="120" height="40" fill="#1e3a4f"/>
  <rect x="500" y="636" width="240" height="16" rx="4" fill="#1e3a4f"/>
  <!-- Screen content area -->
  <rect x="320" y="120" width="640" height="60" rx="4" fill="none" stroke="#4fc3f780" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="336" y="156" fill="#4fc3f780" font-family="sans-serif" font-size="14" font-weight="700">SCREEN TITLE</text>
  <!-- Screen bullet areas -->
  <g>
    <circle cx="340" cy="220" r="6" fill="#4fc3f7" opacity="0.4"/>
    <rect x="362" y="208" width="580" height="24" rx="4" fill="#4fc3f710"/>
    <circle cx="340" cy="280" r="6" fill="#4fc3f7" opacity="0.4"/>
    <rect x="362" y="268" width="580" height="24" rx="4" fill="#4fc3f710"/>
    <circle cx="340" cy="340" r="6" fill="#4fc3f7" opacity="0.4"/>
    <rect x="362" y="328" width="580" height="24" rx="4" fill="#4fc3f710"/>
    <circle cx="340" cy="400" r="6" fill="#4fc3f7" opacity="0.4"/>
    <rect x="362" y="388" width="580" height="24" rx="4" fill="#4fc3f710"/>
  </g>
  <!-- Cloudy character (left side, pointing) -->
  <g transform="translate(160, 480)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="60" ry="50" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="44" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <circle cx="-28" cy="-16" r="28" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <circle cx="28" cy="-16" r="28" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <circle cx="-14" cy="-54" r="24" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <circle cx="14" cy="-54" r="24" fill="#f0f8ff" stroke="#b0d4e8" stroke-width="2"/>
    <!-- Cap -->
    <polygon points="-36,-64 0,-80 36,-64 0,-54" fill="#2c5f7c"/>
    <line x1="0" y1="-66" x2="26" y2="-50" stroke="#f5a975" stroke-width="3"/>
    <!-- Eyes -->
    <ellipse cx="-14" cy="-32" rx="8" ry="10" fill="#fff"/>
    <circle cx="-14" cy="-32" r="6" fill="#2c3e50"/>
    <circle cx="-12" cy="-35" r="2.5" fill="#fff"/>
    <ellipse cx="14" cy="-32" rx="8" ry="10" fill="#fff"/>
    <circle cx="14" cy="-32" r="6" fill="#2c3e50"/>
    <circle cx="16" cy="-35" r="2.5" fill="#fff"/>
    <!-- Smile -->
    <path d="M-8,-10 Q0,-2 8,-10" fill="none" stroke="#d45b5b" stroke-width="3" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-28" cy="-20" rx="8" ry="5" fill="#ffb4b4" opacity="0.3"/>
    <ellipse cx="28" cy="-20" rx="8" ry="5" fill="#ffb4b4" opacity="0.3"/>
    <!-- Right arm pointing at screen -->
    <line x1="56" y1="10" x2="120" y2="-30" stroke="#4a7c9c" stroke-width="8" stroke-linecap="round"/>
    <circle cx="124" cy="-34" r="10" fill="#f0f8ff"/>
    <line x1="130" y1="-38" x2="146" y2="-48" stroke="#f0f8ff" stroke-width="5" stroke-linecap="round"/>
    <!-- Left arm on hip -->
    <path d="M-56,10 Q-72,30 -58,50" fill="none" stroke="#4a7c9c" stroke-width="8" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="-20" y1="64" x2="-24" y2="110" stroke="#4a7c9c" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="-24" cy="114" rx="14" ry="7" fill="#3a6a88"/>
    <line x1="20" y1="64" x2="24" y2="110" stroke="#4a7c9c" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="24" cy="114" rx="14" ry="7" fill="#3a6a88"/>
  </g>
  <!-- Narration area -->
  <rect x="40" y="1560" width="1000" height="280" rx="16" fill="#14283c" opacity="0.88"/>
  <rect x="60" y="1580" width="5" height="60" rx="2" fill="#4fc3f7"/>
  <text x="80" y="1606" fill="#4fc3f780" font-family="sans-serif" font-size="14" font-weight="700">NARRATION</text>
  <!-- Progress -->
  <rect x="0" y="1880" width="1080" height="6" fill="#00000012"/>
</svg>
