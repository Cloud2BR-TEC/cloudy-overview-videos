<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2a1330"/>
      <stop offset="100%" stop-color="#43204b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ba68c8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ba68c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e0f5"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#160a1a" flood-opacity="0.4"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#160a1a" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="620" r="440" fill="url(#glow)"/>

  <!-- Big question mark -->
  <text x="540" y="640" fill="#ba68c8" font-family="Georgia, serif" font-size="520" font-weight="800" text-anchor="middle" opacity="0.25">?</text>

  <!-- Hook chip -->
  <rect x="360" y="180" width="360" height="66" rx="33" fill="#ba68c8" opacity="0.2"/>
  <text x="540" y="222" fill="#e2b6ea" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3" text-anchor="middle">THE BIG QUESTION</text>

  <!-- Question text placeholder -->
  <g fill="#ffffff" opacity="0.14">
    <rect x="140" y="760" width="800" height="34" rx="17"/>
    <rect x="200" y="820" width="680" height="34" rx="17"/>
    <rect x="260" y="880" width="560" height="34" rx="17"/>
  </g>

  <!-- Cloud head only thinking -->
  <g transform="translate(540, 1080)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-42" cy="16" r="46" fill="url(#cloudFill)"/>
      <circle cx="42" cy="16" r="46" fill="url(#cloudFill)"/>
      <circle cx="-20" cy="-26" r="40" fill="url(#cloudFill)"/>
      <circle cx="22" cy="-26" r="40" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="20" rx="74" ry="50" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-46,-36 0,-56 46,-36 0,-16" fill="#2c5f7c"/>
    <ellipse cx="-17" cy="2" rx="10" ry="12" fill="#fff"/>
    <circle cx="-16" cy="4" r="6.5" fill="#25384a"/>
    <ellipse cx="17" cy="2" rx="10" ry="12" fill="#fff"/>
    <circle cx="18" cy="4" r="6.5" fill="#25384a"/>
    <path d="M-10,24 Q0,30 10,26" fill="none" stroke="#d45b5b" stroke-width="4.5" stroke-linecap="round"/>
    <!-- thought dots -->
    <circle cx="70" cy="-50" r="10" fill="#ffffff" opacity="0.6"/>
    <circle cx="96" cy="-78" r="14" fill="#ffffff" opacity="0.6"/>
    <circle cx="128" cy="-112" r="18" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#160a1a" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#ba68c8"/>
  <text x="90" y="1614" fill="#e2b6ea" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#ffffff" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#ba68c8"/>
</svg>
