<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#eef0fb"/>
      <stop offset="100%" stop-color="#d3d8f4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#7986cb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7986cb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e7eafb"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1e2350" flood-opacity="0.22"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1e2350" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="380" r="420" fill="url(#glow)"/>

  <!-- Title chip -->
  <rect x="360" y="150" width="360" height="66" rx="33" fill="#7986cb" opacity="0.18"/>
  <text x="540" y="192" fill="#4a55a5" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3" text-anchor="middle">VS COMPARISON</text>

  <!-- Cloud head only center top -->
  <g transform="translate(540, 320)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="-16" cy="-22" r="32" fill="url(#cloudFill)"/>
      <circle cx="18" cy="-22" r="32" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="60" ry="42" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-38,-30 0,-46 38,-30 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="-13" cy="4" r="5.5" fill="#25384a"/>
    <ellipse cx="14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="15" cy="4" r="5.5" fill="#25384a"/>
    <path d="M-8,20 Q0,28 8,20" fill="none" stroke="#d45b5b" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Two columns -->
  <g filter="url(#soft)">
    <rect x="60" y="440" width="450" height="640" rx="24" fill="#ffffff" opacity="0.75"/>
    <rect x="570" y="440" width="450" height="640" rx="24" fill="#ffffff" opacity="0.75"/>
  </g>
  <rect x="60" y="440" width="450" height="90" rx="24" fill="#7986cb" opacity="0.85"/>
  <rect x="570" y="440" width="450" height="90" rx="24" fill="#5c6bc0" opacity="0.85"/>
  <text x="285" y="500" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="800" text-anchor="middle">OPTION A</text>
  <text x="795" y="500" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="800" text-anchor="middle">OPTION B</text>
  <g fill="#4a55a5" opacity="0.14">
    <rect x="92" y="576" width="386" height="22" rx="11"/>
    <rect x="92" y="628" width="330" height="22" rx="11"/>
    <rect x="92" y="680" width="360" height="22" rx="11"/>
    <rect x="92" y="732" width="300" height="22" rx="11"/>
    <rect x="602" y="576" width="386" height="22" rx="11"/>
    <rect x="602" y="628" width="330" height="22" rx="11"/>
    <rect x="602" y="680" width="360" height="22" rx="11"/>
    <rect x="602" y="732" width="300" height="22" rx="11"/>
  </g>

  <!-- VS badge -->
  <circle cx="540" cy="760" r="46" fill="#3949ab"/>
  <text x="540" y="772" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="800" text-anchor="middle">VS</text>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#1e2350" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#7986cb"/>
  <text x="90" y="1614" fill="#c3c9f2" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#1e2350" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#7986cb"/>
</svg>
