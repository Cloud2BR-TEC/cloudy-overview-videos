<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="comparison-bg" x2="1" y2="1"><stop stop-color="#f3f6ef"/><stop offset="1" stop-color="#cbdcc8"/></linearGradient>
    <linearGradient id="comparison-cloud" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#e3eee1"/></linearGradient>
    <filter id="comparison-shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dy="18" stdDeviation="20" flood-color="#24352a" flood-opacity=".2"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#comparison-bg)"/>
  <path d="M960 0H1920V850H1140Z" fill="#173e42" opacity=".07"/><path d="M0 700L560 180 690 310 230 850H0Z" fill="#d06b51" opacity=".09"/>
  <text x="80" y="112" fill="#54705a" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="4">SIDE BY SIDE</text>
  <!-- Cloudy head, cap, and face only -->
  <g transform="translate(310 520) scale(1.82)" filter="url(#comparison-shadow)">
    <circle cx="-62" cy="18" r="58" fill="url(#comparison-cloud)"/><circle cx="62" cy="18" r="58" fill="url(#comparison-cloud)"/><circle cx="-31" cy="-35" r="53" fill="url(#comparison-cloud)"/><circle cx="32" cy="-35" r="53" fill="url(#comparison-cloud)"/><ellipse cy="28" rx="104" ry="70" fill="url(#comparison-cloud)"/>
    <polygon points="-72,-54 0,-82 72,-54 0,-27" fill="#173e42"/><polygon points="-72,-54 0,-73 72,-54 0,-35" fill="#2e6568"/><path d="M53-49V-4" stroke="#d06b51" stroke-width="6"/><circle cx="53" cy="3" r="8" fill="#d06b51"/>
    <ellipse cx="-31" cy="10" rx="16" ry="20" fill="#fff"/><circle cx="-28" cy="14" r="10" fill="#22383a"/><ellipse cx="31" cy="10" rx="16" ry="20" fill="#fff"/><circle cx="34" cy="14" r="10" fill="#22383a"/><path d="M-22 43Q0 64 22 43" fill="none" stroke="#c45c62" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Comparison panels: x=620 y=180 width=560 height=540 and x=1220 y=180 width=560 height=540 -->
  <g filter="url(#comparison-shadow)" fill="#fff"><rect x="620" y="180" width="560" height="540" rx="22"/><rect x="1220" y="180" width="560" height="540" rx="22"/></g>
  <path d="M620 202A22 22 0 01642 180H1158A22 22 0 011180 202V286H620Z" fill="#d06b51"/><path d="M1220 202A22 22 0 011242 180H1758A22 22 0 011780 202V286H1220Z" fill="#173e42"/>
  <text x="900" y="248" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="28" font-weight="800">OPTION A</text><text x="1500" y="248" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="28" font-weight="800">OPTION B</text>
  <g fill="#789083" opacity=".25"><rect x="680" y="345" width="425" height="22" rx="11"/><rect x="680" y="427" width="370" height="22" rx="11"/><rect x="680" y="509" width="400" height="22" rx="11"/><rect x="1280" y="345" width="425" height="22" rx="11"/><rect x="1280" y="427" width="370" height="22" rx="11"/><rect x="1280" y="509" width="400" height="22" rx="11"/></g>
  <circle cx="1200" cy="450" r="48" fill="#f4f6f0" stroke="#6c806f" stroke-width="3"/><text x="1200" y="462" text-anchor="middle" fill="#33483a" font-family="Segoe UI, sans-serif" font-size="30" font-weight="900">VS</text>
  <!-- Narration band: x=80 y=850 width=1760 height=160 -->
  <rect x="80" y="850" width="1760" height="160" rx="18" fill="#1f3327" filter="url(#comparison-shadow)"/><rect x="80" y="850" width="12" height="160" rx="6" fill="#d06b51"/><text x="130" y="907" fill="#e89a83" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800" letter-spacing="3">NARRATION</text>
</svg>
