<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="comparison-bg" x2="1" y2="1"><stop stop-color="#f3f6ef"/><stop offset="1" stop-color="#cbdcc8"/></linearGradient>
    <linearGradient id="comparison-cloud" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#e3eee1"/></linearGradient>
    <filter id="comparison-shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dy="18" stdDeviation="20" flood-color="#24352a" flood-opacity=".2"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#comparison-bg)"/>
  <path d="M960 0H1920V850H1140Z" fill="#173e42" opacity=".07"/><path d="M0 700L560 180 690 310 230 850H0Z" fill="#d06b51" opacity=".09"/>
  <text x="80" y="112" fill="#54705a" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="4">SIDE BY SIDE</text>
  <!-- Comparison panels: x=620 y=180 width=560 height=540 and x=1220 y=180 width=560 height=540 -->
  <g filter="url(#comparison-shadow)" fill="#fff"><rect x="620" y="180" width="560" height="540" rx="22"/><rect x="1220" y="180" width="560" height="540" rx="22"/></g>
  <circle cx="1200" cy="450" r="48" fill="#f4f6f0" stroke="#6c806f" stroke-width="3"/><text x="1200" y="462" text-anchor="middle" fill="#33483a" font-family="Segoe UI, sans-serif" font-size="30" font-weight="900">VS</text>
</svg>
