<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#3a1410"/>
      <stop offset="100%" stop-color="#59231a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff7043" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff7043" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe3d8"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1c0a07" flood-opacity="0.4"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1c0a07" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="620" r="440" fill="url(#glow)"/>

  <!-- Alert chip -->
  <rect x="380" y="200" width="320" height="70" rx="35" fill="#ff7043" opacity="0.9"/>
  <text x="540" y="245" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="26" font-weight="800" letter-spacing="3" text-anchor="middle">IMPORTANT</text>

  <!-- Big callout card -->
  <g filter="url(#soft)">
    <rect x="90" y="360" width="900" height="640" rx="30" fill="#ffffff" opacity="0.08"/>
  </g>
  <rect x="90" y="360" width="900" height="640" rx="30" fill="none" stroke="#ff7043" stroke-width="3" stroke-opacity="0.5"/>
  <!-- warning icon -->
  <g transform="translate(540, 520)">
    <polygon points="0,-70 80,70 -80,70" fill="none" stroke="#ff7043" stroke-width="8" stroke-linejoin="round"/>
    <rect x="-8" y="-30" width="16" height="60" rx="8" fill="#ff7043"/>
    <circle cx="0" cy="48" r="10" fill="#ff7043"/>
  </g>
  <g fill="#ffffff" opacity="0.16">
    <rect x="180" y="700" width="720" height="30" rx="15"/>
    <rect x="230" y="760" width="620" height="30" rx="15"/>
    <rect x="290" y="820" width="500" height="30" rx="15"/>
  </g>

  <!-- Cloud head only -->
  <g transform="translate(540, 1130)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-38" cy="14" r="42" fill="url(#cloudFill)"/>
      <circle cx="38" cy="14" r="42" fill="url(#cloudFill)"/>
      <circle cx="-18" cy="-24" r="36" fill="url(#cloudFill)"/>
      <circle cx="20" cy="-24" r="36" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="18" rx="66" ry="46" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-42,-34 0,-52 42,-34 0,-16" fill="#2c5f7c"/>
    <ellipse cx="-15" cy="2" rx="9" ry="11" fill="#fff"/>
    <circle cx="-14" cy="4" r="6" fill="#25384a"/>
    <ellipse cx="15" cy="2" rx="9" ry="11" fill="#fff"/>
    <circle cx="16" cy="4" r="6" fill="#25384a"/>
    <path d="M-9,22 Q0,31 9,22" fill="none" stroke="#d45b5b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#1c0a07" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#ff7043"/>
  <text x="90" y="1614" fill="#ffc9b3" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#ffffff" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#ff7043"/>
</svg>
