<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f4ecfb"/>
      <stop offset="100%" stop-color="#ddd0f0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e6f7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#2a1248" flood-opacity="0.22"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#2a1248" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="820" cy="440" r="380" fill="url(#glow)"/>

  <g fill="#ce93d8" opacity="0.16">
    <circle cx="150" cy="820" r="7"/>
    <circle cx="960" cy="880" r="9"/>
    <circle cx="240" cy="1180" r="5"/>
    <circle cx="880" cy="1240" r="6"/>
  </g>

  <!-- Whiteboard -->
  <g filter="url(#soft)">
    <rect x="60" y="80" width="700" height="580" rx="14" fill="#ffffff"/>
  </g>
  <rect x="60" y="80" width="700" height="580" rx="14" fill="none" stroke="#e4d4ef" stroke-width="3"/>
  <rect x="60" y="656" width="700" height="12" rx="4" fill="#9a86ab"/>
  <rect x="190" y="664" width="440" height="12" rx="6" fill="#b7a6c6"/>

  <!-- Board title chip -->
  <rect x="96" y="112" width="380" height="52" rx="26" fill="#ce93d8" opacity="0.16"/>
  <rect x="114" y="130" width="14" height="16" rx="7" fill="#a35bb0"/>
  <text x="140" y="148" fill="#a35bb0" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="2">BOARD TITLE</text>

  <!-- Diagram boxes -->
  <g>
    <rect x="96" y="200" width="300" height="130" rx="16" fill="#ce93d8" opacity="0.12"/>
    <rect x="96" y="200" width="300" height="130" rx="16" fill="none" stroke="#ce93d8" stroke-width="2.5"/>
    <text x="116" y="234" fill="#a35bb0" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="800">CONCEPT A</text>
    <rect x="116" y="250" width="256" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>
    <rect x="116" y="278" width="210" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>

    <rect x="424" y="200" width="300" height="130" rx="16" fill="#ce93d8" opacity="0.12"/>
    <rect x="424" y="200" width="300" height="130" rx="16" fill="none" stroke="#ce93d8" stroke-width="2.5"/>
    <text x="444" y="234" fill="#a35bb0" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="800">CONCEPT B</text>
    <rect x="444" y="250" width="256" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>
    <rect x="444" y="278" width="210" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>

    <line x1="246" y1="330" x2="246" y2="400" stroke="#ce93d8" stroke-width="2.5" stroke-dasharray="6 5"/>
    <polygon points="238,396 246,414 254,396" fill="#ce93d8"/>
    <line x1="574" y1="330" x2="574" y2="400" stroke="#ce93d8" stroke-width="2.5" stroke-dasharray="6 5"/>
    <polygon points="566,396 574,414 582,396" fill="#ce93d8"/>

    <rect x="96" y="410" width="300" height="130" rx="16" fill="#ce93d8" opacity="0.12"/>
    <rect x="96" y="410" width="300" height="130" rx="16" fill="none" stroke="#ce93d8" stroke-width="2.5"/>
    <text x="116" y="444" fill="#a35bb0" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="800">CONCEPT C</text>
    <rect x="116" y="460" width="256" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>

    <rect x="424" y="410" width="300" height="130" rx="16" fill="#ce93d8" opacity="0.12"/>
    <rect x="424" y="410" width="300" height="130" rx="16" fill="none" stroke="#ce93d8" stroke-width="2.5"/>
    <text x="444" y="444" fill="#a35bb0" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="800">CONCEPT D</text>
    <rect x="444" y="460" width="256" height="18" rx="9" fill="#ce93d8" opacity="0.14"/>
  </g>

  <!-- Cloud head only (no body) -->
  <g transform="translate(890, 470)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-40" cy="14" r="46" fill="url(#cloudFill)"/>
      <circle cx="40" cy="14" r="46" fill="url(#cloudFill)"/>
      <circle cx="-18" cy="-28" r="40" fill="url(#cloudFill)"/>
      <circle cx="22" cy="-28" r="40" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="18" rx="72" ry="50" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-46,-38 0,-58 46,-38 0,-18" fill="#22506a"/>
    <polygon points="-46,-38 0,-52 46,-38 0,-24" fill="#2c5f7c"/>
    <path d="M30,-30 L30,0" stroke="#f5a975" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="4" r="5" fill="#f5a975"/>
    <ellipse cx="-17" cy="0" rx="9" ry="11" fill="#fff"/>
    <circle cx="-16" cy="2" r="6" fill="#25384a"/>
    <circle cx="-13" cy="-2" r="2.5" fill="#fff"/>
    <ellipse cx="17" cy="0" rx="9" ry="11" fill="#fff"/>
    <circle cx="18" cy="2" r="6" fill="#25384a"/>
    <circle cx="21" cy="-2" r="2.5" fill="#fff"/>
    <path d="M-10,22 Q0,32 10,22" fill="none" stroke="#d45b5b" stroke-width="4.5" stroke-linecap="round"/>
    <ellipse cx="-32" cy="16" rx="9" ry="6" fill="#ffb4b4" opacity="0.4"/>
    <ellipse cx="32" cy="16" rx="9" ry="6" fill="#ffb4b4" opacity="0.4"/>
  </g>

  <!-- Narration area -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#2a1248" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#ce93d8"/>
  <text x="90" y="1614" fill="#e6c9ec" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>

  <rect x="0" y="1884" width="1080" height="8" fill="#2a1248" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#ce93d8"/>
</svg>
