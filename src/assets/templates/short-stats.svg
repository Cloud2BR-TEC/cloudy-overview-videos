<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="100%" stop-color="#ffe4b0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffb300" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1d4"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#5a3e00" flood-opacity="0.20"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5a3e00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="420" r="420" fill="url(#glow)"/>

  <!-- Title chip -->
  <rect x="390" y="150" width="300" height="66" rx="33" fill="#ffb300" opacity="0.2"/>
  <text x="540" y="192" fill="#a06a00" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3" text-anchor="middle">KEY STATS</text>

  <!-- Cloud head only -->
  <g transform="translate(540, 320)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="34" cy="12" r="38" fill="url(#cloudFill)"/>
      <circle cx="-16" cy="-22" r="32" fill="url(#cloudFill)"/>
      <circle cx="18" cy="-22" r="32" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="60" ry="42" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-38,-30 0,-46 38,-30 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="-13" cy="4" r="5.5" fill="#25384a"/>
    <ellipse cx="14" cy="2" rx="8" ry="10" fill="#fff"/>
    <circle cx="15" cy="4" r="5.5" fill="#25384a"/>
    <path d="M-8,20 Q0,28 8,20" fill="none" stroke="#d45b5b" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Stat cards -->
  <g filter="url(#soft)">
    <rect x="70" y="460" width="440" height="300" rx="24" fill="#ffffff" opacity="0.85"/>
    <rect x="570" y="460" width="440" height="300" rx="24" fill="#ffffff" opacity="0.85"/>
    <rect x="70" y="800" width="440" height="300" rx="24" fill="#ffffff" opacity="0.85"/>
    <rect x="570" y="800" width="440" height="300" rx="24" fill="#ffffff" opacity="0.85"/>
  </g>
  <g font-family="'Segoe UI', sans-serif" text-anchor="middle">
    <text x="290" y="600" fill="#a06a00" font-size="90" font-weight="800">00%</text>
    <text x="290" y="680" fill="#8a7a55" font-size="24" font-weight="600">Metric one</text>
    <text x="790" y="600" fill="#a06a00" font-size="90" font-weight="800">0.0x</text>
    <text x="790" y="680" fill="#8a7a55" font-size="24" font-weight="600">Metric two</text>
    <text x="290" y="940" fill="#a06a00" font-size="90" font-weight="800">000</text>
    <text x="290" y="1020" fill="#8a7a55" font-size="24" font-weight="600">Metric three</text>
    <text x="790" y="940" fill="#a06a00" font-size="90" font-weight="800">00k</text>
    <text x="790" y="1020" fill="#8a7a55" font-size="24" font-weight="600">Metric four</text>
  </g>
  <rect x="70" y="460" width="10" height="300" rx="5" fill="url(#cardA)"/>
  <rect x="570" y="460" width="10" height="300" rx="5" fill="url(#cardA)"/>
  <rect x="70" y="800" width="10" height="300" rx="5" fill="url(#cardA)"/>
  <rect x="570" y="800" width="10" height="300" rx="5" fill="url(#cardA)"/>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#5a3e00" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#ffb300"/>
  <text x="90" y="1614" fill="#ffe0a3" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#5a3e00" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#ffb300"/>
</svg>
