<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="stats-bg" x2="1" y2="1"><stop stop-color="#17172b"/><stop offset="1" stop-color="#272547"/></linearGradient>
    <linearGradient id="stats-cloud" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#e7e6f4"/></linearGradient>
    <filter id="stats-shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dy="18" stdDeviation="20" flood-color="#05050c" flood-opacity=".42"/></filter>
    <pattern id="stats-dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="2" fill="#fff" opacity=".07"/></pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#stats-bg)"/><rect width="1920" height="850" fill="url(#stats-dots)"/>
  <path d="M0 760L460 280 650 470 990 80 1300 360 1680 30 1920 230" fill="none" stroke="#4fd1c5" stroke-width="4" opacity=".12"/>
  <text x="80" y="112" fill="#f7c948" font-family="Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="4">KEY STATS</text>
  <!-- Stats cards use the same 2x2 overall region: x=620..1780, y=180..720 -->
  <g filter="url(#stats-shadow)" fill="#323154" stroke="#4b4a70" stroke-width="2"><rect x="620" y="180" width="560" height="250" rx="22"/><rect x="1220" y="180" width="560" height="250" rx="22"/><rect x="620" y="470" width="560" height="250" rx="22"/><rect x="1220" y="470" width="560" height="250" rx="22"/></g>
  <g fill="#f7c948"><rect x="620" y="180" width="10" height="250" rx="5"/><rect x="1220" y="470" width="10" height="250" rx="5"/></g><g fill="#4fd1c5"><rect x="1220" y="180" width="10" height="250" rx="5"/><rect x="620" y="470" width="10" height="250" rx="5"/></g>
  <g fill="#fff" opacity=".15"><rect x="675" y="286" width="300" height="76" rx="12"/><rect x="1275" y="286" width="300" height="76" rx="12"/><rect x="675" y="576" width="300" height="76" rx="12"/><rect x="1275" y="576" width="300" height="76" rx="12"/></g>
</svg>
