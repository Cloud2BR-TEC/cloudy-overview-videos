<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fff1ea"/>
      <stop offset="100%" stop-color="#ffd8c2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff8a65" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8a65" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="num" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffab91"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe6da"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#5a2510" flood-opacity="0.20"/>
    </filter>
    <filter id="cloudShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5a2510" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="820" cy="360" r="360" fill="url(#glow)"/>

  <!-- Title chip -->
  <rect x="80" y="160" width="330" height="66" rx="33" fill="#ff7043" opacity="0.18"/>
  <text x="110" y="202" fill="#c14a24" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="3">STEP BY STEP</text>

  <!-- Cloud head only -->
  <g transform="translate(870, 250)" filter="url(#cloudShadow)">
    <g>
      <circle cx="-36" cy="12" r="40" fill="url(#cloudFill)"/>
      <circle cx="36" cy="12" r="40" fill="url(#cloudFill)"/>
      <circle cx="-17" cy="-24" r="34" fill="url(#cloudFill)"/>
      <circle cx="19" cy="-24" r="34" fill="url(#cloudFill)"/>
      <ellipse cx="0" cy="16" rx="64" ry="44" fill="url(#cloudFill)"/>
    </g>
    <polygon points="-40,-32 0,-50 40,-32 0,-14" fill="#2c5f7c"/>
    <ellipse cx="-15" cy="2" rx="9" ry="11" fill="#fff"/>
    <circle cx="-14" cy="4" r="6" fill="#25384a"/>
    <ellipse cx="15" cy="2" rx="9" ry="11" fill="#fff"/>
    <circle cx="16" cy="4" r="6" fill="#25384a"/>
    <path d="M-9,21 Q0,30 9,21" fill="none" stroke="#d45b5b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Steps -->
  <g>
    <circle cx="150" cy="470" r="40" fill="url(#num)"/>
    <text x="150" y="484" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="800" text-anchor="middle">1</text>
    <rect x="220" y="430" width="790" height="80" rx="18" fill="#ffffff" opacity="0.7"/>
    <rect x="250" y="460" width="500" height="20" rx="10" fill="#c14a24" opacity="0.2"/>

    <circle cx="150" cy="620" r="40" fill="url(#num)"/>
    <text x="150" y="634" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="800" text-anchor="middle">2</text>
    <rect x="220" y="580" width="790" height="80" rx="18" fill="#ffffff" opacity="0.7"/>
    <rect x="250" y="610" width="560" height="20" rx="10" fill="#c14a24" opacity="0.2"/>

    <circle cx="150" cy="770" r="40" fill="url(#num)"/>
    <text x="150" y="784" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="800" text-anchor="middle">3</text>
    <rect x="220" y="730" width="790" height="80" rx="18" fill="#ffffff" opacity="0.7"/>
    <rect x="250" y="760" width="480" height="20" rx="10" fill="#c14a24" opacity="0.2"/>

    <circle cx="150" cy="920" r="40" fill="url(#num)"/>
    <text x="150" y="934" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="800" text-anchor="middle">4</text>
    <rect x="220" y="880" width="790" height="80" rx="18" fill="#ffffff" opacity="0.7"/>
    <rect x="250" y="910" width="600" height="20" rx="10" fill="#c14a24" opacity="0.2"/>

    <circle cx="150" cy="1070" r="40" fill="url(#num)"/>
    <text x="150" y="1084" fill="#fff" font-family="'Segoe UI', sans-serif" font-size="34" font-weight="800" text-anchor="middle">5</text>
    <rect x="220" y="1030" width="790" height="80" rx="18" fill="#ffffff" opacity="0.7"/>
    <rect x="250" y="1060" width="520" height="20" rx="10" fill="#c14a24" opacity="0.2"/>
  </g>
  <line x1="150" y1="510" x2="150" y2="1030" stroke="#ff7043" stroke-width="4" opacity="0.3"/>

  <!-- Narration -->
  <g filter="url(#soft)">
    <rect x="40" y="1560" width="1000" height="290" rx="26" fill="#5a2510" opacity="0.92"/>
  </g>
  <rect x="66" y="1584" width="6" height="66" rx="3" fill="#ff7043"/>
  <text x="90" y="1614" fill="#ffc9b3" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="2">NARRATION</text>
  <rect x="0" y="1884" width="1080" height="8" fill="#5a2510" opacity="0.12"/>
  <rect x="0" y="1884" width="360" height="8" fill="#ff7043"/>
</svg>
